<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Mutiso.AI">
  <!-- Brand mark: the same lucide "hard-hat" glyph the in-app logo uses
       (see the HardHat icon in Landing.tsx's header), on the safety-yellow
       primary. Colours are the resolved --primary (48 95% 60%) and
       --primary-foreground (220 10% 8%) from src/index.css, so the tab icon
       and the app render the same yellow rather than two near-misses.
       Replaces the purple Lovable scaffold logo this file used to hold. -->
  <rect width="64" height="64" rx="14" fill="#FAD338"/>
  <!-- The glyph's inked area is x 2..22, y 4..19 within lucide's 24 box - its
       vertical centre is 11.5, not 12 - so the y offset is 11.875, not 11, to
       sit optically centred in the 64 box rather than ~1 unit high. -->
  <g transform="translate(11 11.875) scale(1.75)" fill="none" stroke="#121416"
     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/>
    <path d="M14 6a6 6 0 0 1 6 6v3"/>
    <path d="M4 15v-3a6 6 0 0 1 6-6"/>
    <rect x="2" y="15" width="20" height="4" rx="1"/>
  </g>
</svg>
